<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" content="#0d0f14" />
<title>Entrar · Precifica3D</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d0f14;
    --surface: #161a22;
    --border:  #2a2f3d;
    --accent:  #4f8ef7;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --red:     #ef4444;
    --radius:  10px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px 16px;
  }

  /* ── Card ───────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
  }

  @media (max-width: 420px) {
    .card { padding: 28px 20px; border-radius: 12px; }
  }

  /* ── Logo ───────────────────────────────────────────────── */
  .logo-wrap {
    text-align: center;
    margin-bottom: 28px;
  }

  .logo-icon {
    width: 52px; height: 52px;
    background: var(--accent);
    border-radius: 12px;
    display: inline-grid;
    place-items: center;
    font-size: 26px;
    margin-bottom: 12px;
    box-shadow: 0 0 0 4px rgba(79,142,247,0.15);
  }

  .logo-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── Form ───────────────────────────────────────────────── */
  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 7px;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 16px;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
  }

  input::placeholder { color: var(--muted); }

  /* ── Password wrapper ───────────────────────────────────── */
  .pwd-wrap { position: relative; }

  .pwd-toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    line-height: 1;
  }

  /* ── Error ──────────────────────────────────────────────── */
  .error-msg {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: #fca5a5;
    margin-bottom: 16px;
  }

  .error-msg.visible { display: block; }

  /* ── Botão ──────────────────────────────────────────────── */
  .btn-login {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 8px;
    position: relative;
  }

  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-loader {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
  }

  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

  /* ── Footer ─────────────────────────────────────────────── */
  .card-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: var(--muted);
  }

  /* ── Tracking feedback (invisível, debug only) ───────────── */
  #track-debug { display: none; }
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">🏷️</div>
    <div class="logo-title">Precifica3D</div>
    <div class="logo-sub">Calculadora para impressão 3D</div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="form-group">
    <label for="email">E-mail</label>
    <input
      type="email"
      id="email"
      placeholder="seu@email.com"
      autocomplete="email"
      autocapitalize="none"
      inputmode="email"
    />
  </div>

  <div class="form-group">
    <label for="password">Senha</label>
    <div class="pwd-wrap">
      <input
        type="password"
        id="password"
        placeholder="••••••••"
        autocomplete="current-password"
      />
      <button class="pwd-toggle" type="button" onclick="togglePwd()" aria-label="Mostrar senha">
        👁️
      </button>
    </div>
  </div>

  <button class="btn-login" id="btn-login" onclick="doLogin()">
    Entrar
    <div class="btn-loader" id="btn-loader"></div>
  </button>

  <div class="card-footer">
    Precifica3D · Creative Works 3D
  </div>
</div>

<!-- ── Firebase ─────────────────────────────────────────────── -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Tracking module -->
<script src="tracking.js"></script>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIGURAÇÃO FIREBASE — substitua pelos seus valores
// ══════════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyB_TmUQN_JQwYh-QQzdmehMhqe1Apnqwv8",
  authDomain:        "calculadora3d-5d2db.firebaseapp.com",
  projectId:         "calculadora3d-5d2db",
  storageBucket:     "calculadora3d-5d2db.firebasestorage.app",
  messagingSenderId: "40753148792",
  appId:             "1:40753148792:web:8b900e70fbdbcb3eea8e8d"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

// ── UI helpers ────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById("btn-login").disabled = on;
  document.getElementById("btn-loader").style.display = on ? "block" : "none";
  document.getElementById("btn-login").childNodes[0].textContent = on ? "Entrando…" : "Entrar";
}

function showError(msg) {
  const el = document.getElementById("error-msg");
  el.textContent = msg;
  el.classList.add("visible");
}

function clearError() {
  document.getElementById("error-msg").classList.remove("visible");
}

function togglePwd() {
  const inp = document.getElementById("password");
  inp.type = inp.type === "password" ? "text" : "password";
}

// ── Enter key ─────────────────────────────────────────────────
document.getElementById("password").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

document.getElementById("email").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("password").focus();
});

// ── Login ─────────────────────────────────────────────────────
async function doLogin() {
  clearError();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    showError("Preencha e-mail e senha.");
    return;
  }

  setLoading(true);

  try {
    const cred = await auth.signInWithEmailAndPassword(email, password);
    const user = cred.user;

    // ── Tracking (funciona em Mobile e Desktop) ──
    try {
      const tracker = window.Precifica3DTracking;
      await tracker.trackLogin(db, user.uid, user.email);
    } catch (trackErr) {
      console.warn("[Tracking] Falha ao salvar tracking:", trackErr);
      // Não bloqueia o login
    }

    // ── Redireciona ──
    const base = window.location.pathname.replace(/\/[^/]*$/, "");
    window.location.href = base + "/index.html";
  } catch (err) {
    setLoading(false);
    const msgs = {
      "auth/user-not-found":    "Usuário não encontrado.",
      "auth/wrong-password":    "Senha incorreta.",
      "auth/invalid-email":     "E-mail inválido.",
      "auth/too-many-requests": "Muitas tentativas. Aguarde alguns minutos.",
      "auth/user-disabled":     "Conta desativada. Entre em contato.",
      "auth/network-request-failed": "Sem conexão com a internet.",
    };
    showError(msgs[err.code] || `Erro: ${err.message}`);
  }
}

// Auto-redirect desativado — evita loop em GitHub Pages
</script>
</body>
</html>
